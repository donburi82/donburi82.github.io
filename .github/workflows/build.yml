name: Deploy Jekyll site to Pages (with jekyll-scholar)

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # If you later auto-fetch a .bib (e.g., from Zotero), do it here
      # and write to files/papers.bib before the build.
      # - name: (Optional) Fetch .bib from Zotero API
      #   env:
      #     ZOTERO_USER_ID: ${{ secrets.ZOTERO_USER_ID }}
      #     ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
      #     ZOTERO_COLLECTION_KEY: ${{ secrets.ZOTERO_COLLECTION_KEY }}
      #   run: |
      #     mkdir -p files
      #     curl -sSL -H "Zotero-API-Key: $ZOTERO_API_KEY" \
      #       "https://api.zotero.org/users/${ZOTERO_USER_ID}/collections/${ZOTERO_COLLECTION_KEY}/items?format=bibtex" \
      #       > files/papers.bib

      - name: Verify BibTeX exists
        run: |
          if [ ! -f "files/papers.bib" ]; then
            echo "ERROR: files/papers.bib not found. Add your BibTeX or enable the fetch step."
            exit 1
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install gems
        run: bundle install --jobs 4 --retry 3

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
