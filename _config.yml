  - title: Research Interests
    layout: text
    content: | # this will include new lines to allow paragraphs
      I am broadly interested in building machine learning systems that are reliable, equitable, and socially responsible across a wide range of decision-making contexts. In particular, I want to understand how models arrive at their decisions, when those decisions can be justified, and why models fail.
      
      Much of my current research focuses on large language models (LLMs), especially questions around interpretability, reliability, and fairness. My main motivation, however, is not LLMs in themselves, but the broader challenge of ensuring that machine learning systems are dependable and responsible in practice.

