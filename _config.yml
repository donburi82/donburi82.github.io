about_content: | # this will include new lines to allow paragraphs
  Welcome to my personal website. Here, I share projects that do not fit on a one-page resume (available in the top-right corner of this page), ranging from early proof of concept work to longer-term projects, along with a few notes on what I enjoy outside of coding.
  
  I am motivated by building technology that solves real-world problems. While my strongest experience is in backend and ML-related work, I have been actively expanding into broader full-stack development and enjoy challenging myself in new areas.

  I am currently seeking a new-grad Software Engineer or Machine Learning Engineer role in the United States. I am most excited by opportunities to learn quickly, take ownership, and grow through meaningful engineering work.

